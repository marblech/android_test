name: Android Debug Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: "11"

      - name: Install Gradle and Android SDK
        run: |
          set -e
          export DEBIAN_FRONTEND=noninteractive
          (sudo apt-get update && sudo apt-get install -y wget unzip) || (apt-get update && apt-get install -y wget unzip)

          export GRADLE_VERSION=6.5
          wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d "$HOME"

          export ANDROID_SDK_ROOT="$HOME/android-sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/commandlinetools.zip
          unzip -q /tmp/commandlinetools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"

          export PATH="$HOME/gradle-${GRADLE_VERSION}/bin:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"

          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"

          printf "sdk.dir=%s\n" "$ANDROID_SDK_ROOT" > local.properties

          gradle -v
          sdkmanager --list | head -n 20 || true

      - name: Build debug APK
        run: |
          set -e
          export GRADLE_VERSION=6.5
          export ANDROID_SDK_ROOT="$HOME/android-sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export PATH="$HOME/gradle-${GRADLE_VERSION}/bin:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          gradle --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v3
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
